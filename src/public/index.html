<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <canvas id="stars"></canvas>
    <div class="home-screen">
      <div class="scene-layer">
        <!-- space background
      spaceship windows
      character
      pet -->
        <div class="character">
          <img src="assets/sprites/testAvatar.png" alt="Character" />
        </div>
      </div>

      <div class="ui-layer">
        <div class="top-bar">
          <div class="top-box usernameBox">
            <span class="usernameDisplay"></span>
          </div>
          <div class="top-box tokensBox">
            <span class="tokens">🪙 0</span>
          </div>
          <div class="top-box transmissionsBox">
            <span class="transmissions">📡 0</span>
          </div>
          <div class="top-box timeBox">
            <span class="time">00:00</span>
          </div>
        </div>
        
        <div class="floating-btns">
       
          <a class="floating-btn chatroom" href="chatroom/index.html">

            <div class="outer-ring"></div>

            <svg class="orbit-ring" viewBox="0 0 200 200">
              <defs>
                <path
                  id="circlePath"
                  d="M100,100 m-90,0 a90,90 0 1,1 180,0 a90,90 0 1,1 -180,0"
                />
              </defs>
              <text font-size="8" fill="#9bdcff" font-family="Press Start 2P">
                <textPath href="#circlePath" startOffset="0%">
                  DeepSpace Lounge
                </textPath>
              </text>
            </svg>

            <div class="chatroom-core">
              <div class="chat-icon"></div>
            </div>
          </a>
          <div class="orbit orbit-dm">
            <button class="floating-btn dm">✉</button>
          </div>

          <div class="orbit orbit-avatar">
            <button class="floating-btn avatar">✎</button>
          </div>
        </div>
      </div>
    </div>


<!-- Default dropup button -->
<div class="btn-group dropup">
  <button type="button" class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
☰</button>
  <ul class="dropdown-menu">
    <!-- Dropdown menu links -->
    <li><a class="dropdown-item" href="#">settings</a></li>
    <li><a class="dropdown-item" href="profile/index.html">Profile</a></li>
  </ul>
</div>

    <audio id="bgm" src="assets/audio/Bgm.mp3" autoplay loop muted></audio>
    <script src="js/stars.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
